name: OCR Performance

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - 'reports/ocr-performance.md'

permissions:
  contents: write

concurrency:
  group: ocr-performance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ocr-performance:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run OCR benchmarks and write report
        id: benchmark
        continue-on-error: true
        shell: bash
        run: |
          set +e

          npm run test:e2e:tesseract -- --workers 5 --results-subdir ocr-backend-runs/tesseract
          tesseract_exit=$?

          npm run test:e2e:paddleonnx -- --workers 5 --results-subdir ocr-backend-runs/paddleonnx
          paddleonnx_exit=$?

          node ./scripts/write-ocr-performance-report.mjs --input-dir ./test-results/ocr-backend-runs --output ./reports/ocr-performance.md
          report_exit=$?

          {
            echo "tesseract_exit=$tesseract_exit"
            echo "paddleonnx_exit=$paddleonnx_exit"
            echo "report_exit=$report_exit"
          } >> "$GITHUB_OUTPUT"

          if [ "$tesseract_exit" -ne 0 ] || [ "$paddleonnx_exit" -ne 0 ] || [ "$report_exit" -ne 0 ]; then
            exit 1
          fi

      - name: Upload OCR benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ocr-performance-results
          path: |
            reports/ocr-performance.md
            test-results/ocr-backend-runs
          if-no-files-found: warn

      - name: Commit OCR performance report
        if: always()
        shell: bash
        run: |
          if [ -z "$(git status --porcelain -- reports/ocr-performance.md)" ]; then
            echo "No OCR performance report changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/ocr-performance.md
          git commit -m "chore: update OCR performance report [skip ci]"
          git push

      - name: Fail workflow when benchmarks fail
        if: always() && steps.benchmark.outcome == 'failure'
        run: exit 1
